<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi Giao Dịch - KOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .icon {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        p {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-block;
            background: #ef4444;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">⚠️</div>
        <h2>Giao Dịch Thất Bại</h2>
        <p>{{ error }}</p>
        <a href="javascript:history.back()" class="btn">Quay Lại</a>
    </div>
</body>

</html>
